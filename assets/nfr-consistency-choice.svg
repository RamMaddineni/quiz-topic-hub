<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Strong versus eventual consistency decision</title>
  <desc id="desc">When replicas cannot communicate, a strong-consistency path waits or rejects writes to protect correctness, while an eventual-consistency path accepts work and temporarily allows stale views before replicas converge. Systems choose per operation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f5ff"/>
      <stop offset="1" stop-color="#f2fbf9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#1f2b4d" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#6941c6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#087f5b"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="60" y="62" fill="#17343d" font-family="Inter,Arial,sans-serif" font-size="33" font-weight="800">Consistency is chosen per operation—not once per system</text>
  <text x="60" y="98" fill="#5b6f78" font-family="Inter,Arial,sans-serif" font-size="20">The real question appears when replicas cannot communicate.</text>

  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <rect x="355" y="126" width="490" height="86" rx="24" fill="#173f47"/>
    <text x="600" y="161" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="800">NETWORK PARTITION</text>
    <text x="600" y="190" text-anchor="middle" fill="#bfe6e1" font-size="17">Replica A cannot confirm Replica B’s latest state</text>
  </g>

  <path d="M520 212C455 245 390 265 328 294" fill="none" stroke="#6941c6" stroke-width="4" marker-end="url(#arrowPurple)"/>
  <path d="M680 212C745 245 810 265 872 294" fill="none" stroke="#087f5b" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <rect x="70" y="286" width="500" height="274" rx="28" fill="#ffffff" stroke="#c5b3f0" stroke-width="3"/>
    <circle cx="126" cy="341" r="29" fill="#f0eaff"/>
    <path d="M114 342l9 9 18-21" fill="none" stroke="#6941c6" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="174" y="348" fill="#6941c6" font-size="27" font-weight="800">Strong consistency</text>
    <text x="105" y="397" fill="#293f49" font-size="19" font-weight="800">Protect correctness</text>
    <text x="105" y="427" fill="#5c7078" font-size="16">• Wait for quorum / leader / consensus</text>
    <text x="105" y="454" fill="#5c7078" font-size="16">• Reject or delay when agreement is impossible</text>
    <text x="105" y="481" fill="#5c7078" font-size="16">• Trade-off: lower write availability</text>
    <rect x="105" y="505" width="430" height="35" rx="17" fill="#f3efff"/>
    <text x="320" y="528" text-anchor="middle" fill="#6941c6" font-size="16" font-weight="800">Best fit: payment · balance · final order</text>

    <rect x="630" y="286" width="500" height="274" rx="28" fill="#ffffff" stroke="#91d5c0" stroke-width="3"/>
    <circle cx="686" cy="341" r="29" fill="#e1f7ef"/>
    <path d="M672 348c7-20 25-27 38-14M710 334l-3 14-14-4" fill="none" stroke="#087f5b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="734" y="348" fill="#087f5b" font-size="27" font-weight="800">Eventual consistency</text>
    <text x="665" y="397" fill="#293f49" font-size="19" font-weight="800">Protect responsiveness</text>
    <text x="665" y="427" fill="#5c7078" font-size="16">• Accept locally and propagate asynchronously</text>
    <text x="665" y="454" fill="#5c7078" font-size="16">• Replicas may temporarily show different values</text>
    <text x="665" y="481" fill="#5c7078" font-size="16">• Healthy replicas converge later</text>
    <rect x="665" y="505" width="430" height="35" rx="17" fill="#edf9f5"/>
    <text x="880" y="528" text-anchor="middle" fill="#087f5b" font-size="16" font-weight="800">Best fit: likes · feeds · recommendations</text>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="112" y="580" width="976" height="115" rx="24" fill="#173f47"/>
    <text x="148" y="616" fill="#63d7ca" font-size="18" font-weight="800">INTERVIEW RULE</text>
    <rect x="916" y="593" width="128" height="38" rx="19" fill="#0b8f6b"/>
    <text x="980" y="618" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="800">per operation</text>
    <text x="148" y="650" fill="#ffffff" font-size="17" font-weight="700">State the invariant first.</text>
    <text x="148" y="677" fill="#ffffff" font-size="17" font-weight="700">Then choose the weakest consistency that safely protects it.</text>
  </g>
</svg>
