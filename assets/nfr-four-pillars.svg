<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">The four non-functional requirement pillars</title>
  <desc id="desc">Availability, scalability, latency, and consistency surround a central business-priority decision. Each pillar maps to a measurable question and common architecture patterns.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2fbf9"/>
      <stop offset="1" stop-color="#f5f3ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17313a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#78909c"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="60" y="66" fill="#14343c" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800">Four constraints. One priority decision.</text>
  <text x="60" y="102" fill="#567078" font-family="Inter,Arial,sans-serif" font-size="20">Turn vague quality goals into measurable targets before choosing technology.</text>

  <g stroke="#78909c" stroke-width="3" stroke-dasharray="8 8" fill="none" marker-end="url(#arrow)">
    <path d="M510 310C450 270 410 247 354 228"/>
    <path d="M690 310C750 270 790 247 846 228"/>
    <path d="M510 420C450 455 410 478 354 497"/>
    <path d="M690 420C750 455 790 478 846 497"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="418" y="272" width="364" height="188" rx="30" fill="#153d43"/>
  </g>
  <circle cx="600" cy="330" r="32" fill="#63d7ca"/>
  <path d="M585 330l10 10 21-24" fill="none" stroke="#10383d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="389" text-anchor="middle" fill="#ffffff" font-family="Inter,Arial,sans-serif" font-size="26" font-weight="800">BUSINESS PRIORITY</text>
  <text x="600" y="422" text-anchor="middle" fill="#bfe6e1" font-family="Inter,Arial,sans-serif" font-size="18">Choose targets users actually need</text>

  <g filter="url(#shadow)">
    <rect x="72" y="142" width="310" height="176" rx="24" fill="#ffffff" stroke="#9bd9c3" stroke-width="2"/>
    <rect x="818" y="142" width="310" height="176" rx="24" fill="#ffffff" stroke="#9cc7f1" stroke-width="2"/>
    <rect x="72" y="432" width="310" height="176" rx="24" fill="#ffffff" stroke="#f4c38b" stroke-width="2"/>
    <rect x="818" y="432" width="310" height="176" rx="24" fill="#ffffff" stroke="#c9b5f5" stroke-width="2"/>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <circle cx="119" cy="188" r="24" fill="#dcf7ec"/>
    <path d="M108 188l8 8 15-18" fill="none" stroke="#087f5b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="158" y="196" fill="#087f5b" font-size="25" font-weight="800">Availability</text>
    <text x="104" y="239" fill="#324d55" font-size="18" font-weight="700">Question</text>
    <text x="104" y="266" fill="#5f7379" font-size="17">How much downtime is allowed?</text>
    <text x="104" y="295" fill="#087f5b" font-size="16">Redundancy · health checks · failover</text>

    <circle cx="865" cy="188" r="24" fill="#e7f2ff"/>
    <path d="M853 199v-14h8v14m5 0v-27h8v27m5 0v-39h8v39" fill="none" stroke="#1769aa" stroke-width="4" stroke-linejoin="round"/>
    <text x="904" y="196" fill="#1769aa" font-size="25" font-weight="800">Scalability</text>
    <text x="850" y="239" fill="#324d55" font-size="18" font-weight="700">Question</text>
    <text x="850" y="266" fill="#5f7379" font-size="17">Can performance survive growth?</text>
    <text x="850" y="295" fill="#1769aa" font-size="16">Scale out · stateless · cache · queue</text>

    <circle cx="119" cy="478" r="24" fill="#fff0df"/>
    <path d="M106 489a17 17 0 1 1 26 0M119 478l12-10" fill="none" stroke="#c76700" stroke-width="4" stroke-linecap="round"/>
    <text x="158" y="486" fill="#b85d00" font-size="25" font-weight="800">Latency</text>
    <text x="104" y="529" fill="#324d55" font-size="18" font-weight="700">Question</text>
    <text x="104" y="556" fill="#5f7379" font-size="17">How long does one request take?</text>
    <text x="104" y="585" fill="#b85d00" font-size="16">CDN · indexes · fewer hops · edge</text>

    <circle cx="865" cy="478" r="24" fill="#f0eaff"/>
    <circle cx="857" cy="471" r="7" fill="none" stroke="#6941c6" stroke-width="3"/>
    <circle cx="873" cy="485" r="7" fill="none" stroke="#6941c6" stroke-width="3"/>
    <path d="M861 477l8 3" stroke="#6941c6" stroke-width="3"/>
    <text x="904" y="486" fill="#6941c6" font-size="25" font-weight="800">Consistency</text>
    <text x="850" y="529" fill="#324d55" font-size="18" font-weight="700">Question</text>
    <text x="850" y="556" fill="#5f7379" font-size="17">How fresh and correct must data be?</text>
    <text x="850" y="585" fill="#6941c6" font-size="16">Leader · quorum · consensus · converge</text>
  </g>

  <rect x="212" y="649" width="776" height="43" rx="21" fill="#ffffff" stroke="#d8e2e4"/>
  <text x="600" y="677" text-anchor="middle" fill="#435e65" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="700">Trade-off rule: optimize deliberately—trying to maximize everything raises cost and complexity.</text>
</svg>
