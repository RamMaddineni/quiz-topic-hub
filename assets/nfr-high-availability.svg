<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">High-availability architecture flow</title>
  <desc id="desc">Users reach a global traffic manager, then a regional load balancer that health-checks services across two availability zones. A failed service is removed from rotation, and a second region contains regional failure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="1" stop-color="#f2fbf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17313a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#326c7a"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#087f5b"/>
    </marker>
  </defs>

  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <text x="58" y="62" fill="#14343c" font-family="Inter,Arial,sans-serif" font-size="33" font-weight="800">High availability = redundancy + detection + isolation</text>
  <text x="58" y="98" fill="#587179" font-family="Inter,Arial,sans-serif" font-size="20">A backup is useful only when traffic can detect failure and reach an independent healthy copy.</text>

  <g filter="url(#shadow)" font-family="Inter,Arial,sans-serif">
    <rect x="50" y="282" width="150" height="116" rx="22" fill="#ffffff" stroke="#aed5df" stroke-width="2"/>
    <circle cx="92" cy="326" r="13" fill="#73b7ca"/>
    <circle cx="125" cy="326" r="13" fill="#73b7ca"/>
    <circle cx="158" cy="326" r="13" fill="#73b7ca"/>
    <path d="M73 368c6-23 32-30 51-15 18-15 44-8 51 15" fill="none" stroke="#326c7a" stroke-width="5" stroke-linecap="round"/>
    <text x="125" y="386" text-anchor="middle" fill="#31515a" font-size="17" font-weight="800">USERS</text>

    <rect x="252" y="272" width="190" height="136" rx="24" fill="#163f47"/>
    <circle cx="347" cy="315" r="22" fill="#63d7ca"/>
    <path d="M333 315h28M347 301v28" stroke="#133940" stroke-width="4" stroke-linecap="round"/>
    <text x="347" y="361" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="800">GLOBAL TRAFFIC</text>
    <text x="347" y="386" text-anchor="middle" fill="#bfe6e1" font-size="16">manager / DNS</text>
  </g>

  <path d="M200 340h44" stroke="#326c7a" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M442 321C486 278 500 236 535 218" stroke="#326c7a" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M442 359C486 401 500 466 535 486" stroke="#326c7a" stroke-width="4" fill="none" stroke-dasharray="10 8" marker-end="url(#arrow)"/>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="515" y="124" width="635" height="300" rx="28" fill="#ffffff" stroke="#82c7b5" stroke-width="3"/>
    <rect x="535" y="143" width="595" height="45" rx="14" fill="#e6f7f2"/>
    <text x="558" y="173" fill="#087f5b" font-size="20" font-weight="800">REGION A · active</text>
    <text x="1098" y="173" text-anchor="end" fill="#4c6f68" font-size="16">regional blast-radius boundary</text>

    <g filter="url(#shadow)">
      <rect x="554" y="207" width="165" height="82" rx="18" fill="#173f47"/>
      <text x="637" y="240" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="800">LOAD BALANCER</text>
      <text x="637" y="267" text-anchor="middle" fill="#bfe6e1" font-size="15">routes only to healthy</text>
    </g>

    <rect x="760" y="207" width="166" height="177" rx="20" fill="#f5fbfa" stroke="#b3dcd1" stroke-width="2"/>
    <text x="843" y="235" text-anchor="middle" fill="#32665c" font-size="17" font-weight="800">AZ 1</text>
    <rect x="785" y="257" width="116" height="45" rx="12" fill="#dff5ed" stroke="#69b89e"/>
    <text x="843" y="286" text-anchor="middle" fill="#087f5b" font-size="16" font-weight="700">Service A</text>
    <rect x="785" y="319" width="116" height="45" rx="12" fill="#ffe7e7" stroke="#e48c8c"/>
    <text x="843" y="348" text-anchor="middle" fill="#b42318" font-size="16" font-weight="700">Service B</text>
    <path d="M816 323l54 38M870 323l-54 38" stroke="#c92a2a" stroke-width="5" stroke-linecap="round"/>

    <rect x="954" y="207" width="166" height="177" rx="20" fill="#f5fbfa" stroke="#b3dcd1" stroke-width="2"/>
    <text x="1037" y="235" text-anchor="middle" fill="#32665c" font-size="17" font-weight="800">AZ 2</text>
    <rect x="979" y="257" width="116" height="45" rx="12" fill="#dff5ed" stroke="#69b89e"/>
    <text x="1037" y="286" text-anchor="middle" fill="#087f5b" font-size="16" font-weight="700">Service C</text>
    <rect x="979" y="319" width="116" height="45" rx="12" fill="#dff5ed" stroke="#69b89e"/>
    <text x="1037" y="348" text-anchor="middle" fill="#087f5b" font-size="16" font-weight="700">Service D</text>

    <path d="M719 238h34" stroke="#326c7a" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M719 260C820 419 941 406 974 345" stroke="#087f5b" stroke-width="4" fill="none" marker-end="url(#arrowGreen)"/>
    <text x="748" y="410" fill="#087f5b" font-size="16" font-weight="800">health check fails → remove B → reroute</text>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="515" y="456" width="635" height="150" rx="28" fill="#ffffff" stroke="#9fc5e9" stroke-width="3"/>
    <rect x="535" y="475" width="595" height="42" rx="14" fill="#eaf4ff"/>
    <text x="558" y="503" fill="#1769aa" font-size="20" font-weight="800">REGION B · active or standby</text>
    <rect x="558" y="538" width="156" height="45" rx="12" fill="#e7f2ff" stroke="#83b7e6"/>
    <text x="636" y="566" text-anchor="middle" fill="#1769aa" font-size="16" font-weight="700">Load balancer</text>
    <rect x="754" y="538" width="144" height="45" rx="12" fill="#e7f2ff" stroke="#83b7e6"/>
    <text x="826" y="566" text-anchor="middle" fill="#1769aa" font-size="16" font-weight="700">AZ 1 services</text>
    <rect x="938" y="538" width="144" height="45" rx="12" fill="#e7f2ff" stroke="#83b7e6"/>
    <text x="1010" y="566" text-anchor="middle" fill="#1769aa" font-size="16" font-weight="700">AZ 2 services</text>
    <path d="M714 560h32M898 560h32" stroke="#326c7a" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Inter,Arial,sans-serif">
    <rect x="65" y="637" width="1070" height="55" rx="22" fill="#173f47"/>
    <text x="600" y="671" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="700">Independent fault domains limit impact: instance → availability zone → region.</text>
  </g>
</svg>
