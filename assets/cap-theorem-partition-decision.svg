<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">CAP theorem: the decision forced by a network partition</title>
  <desc id="desc">When replicas can communicate, a distributed system can be consistent and available. During a network partition, accepting writes on both isolated replicas preserves availability but can produce conflicting values, while refusing writes on one side preserves consistency but sacrifices availability for clients on that side.</desc>
  <defs>
    <style>
      .bg{fill:#f5fbfa}.card{fill:#fff;stroke:#b9d8d3;stroke-width:2}.soft{fill:#eaf6f3;stroke:#9bc8c0;stroke-width:2}
      .good{fill:#e7f7ee;stroke:#58a87c;stroke-width:2}.warn{fill:#fff3dd;stroke:#d99a2b;stroke-width:2}.bad{fill:#fff0ef;stroke:#d8675e;stroke-width:2}
      .ink{fill:#173632}.muted{fill:#55726d}.teal{fill:#0f766e}.orange{fill:#a85d00}.red{fill:#b23b33}.white{fill:#fff}
      .h1{font:700 36px system-ui,-apple-system,Segoe UI,sans-serif}.h2{font:700 24px system-ui,-apple-system,Segoe UI,sans-serif}
      .h3{font:700 19px system-ui,-apple-system,Segoe UI,sans-serif}.body{font:16px system-ui,-apple-system,Segoe UI,sans-serif}
      .small{font:14px system-ui,-apple-system,Segoe UI,sans-serif}.label{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;letter-spacing:.06em}
      .line{stroke:#0f766e;stroke-width:4;fill:none;stroke-linecap:round}.broken{stroke:#d8675e;stroke-width:4;fill:none;stroke-linecap:round;stroke-dasharray:12 10}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#0f766e"/></marker>
  </defs>

  <rect class="bg" width="1200" height="900" rx="28"/>
  <text x="600" y="55" text-anchor="middle" class="h1 ink">CAP is a decision made <tspan class="red">during a network partition</tspan></text>
  <text x="600" y="86" text-anchor="middle" class="body muted">P is not “a replica died.” P means healthy replicas cannot communicate, while clients can still reach them.</text>

  <!-- Normal operation -->
  <rect x="45" y="115" width="1110" height="180" rx="20" class="good"/>
  <rect x="70" y="137" width="180" height="34" rx="17" fill="#287a55"/>
  <text x="160" y="160" text-anchor="middle" class="label white">NO PARTITION</text>
  <text x="280" y="162" class="h2 ink">Replicas can coordinate → consistency + availability can coexist</text>
  <rect x="125" y="202" width="190" height="66" rx="14" class="card"/><text x="220" y="229" text-anchor="middle" class="h3 ink">Replica A</text><text x="220" y="251" text-anchor="middle" class="small teal">value = 7</text>
  <rect x="885" y="202" width="190" height="66" rx="14" class="card"/><text x="980" y="229" text-anchor="middle" class="h3 ink">Replica B</text><text x="980" y="251" text-anchor="middle" class="small teal">value = 7</text>
  <path d="M325 235 H875" class="line" marker-end="url(#arrow)"/>
  <text x="600" y="220" text-anchor="middle" class="small teal">replicate / agree / acknowledge</text>

  <!-- Partition condition -->
  <rect x="45" y="320" width="1110" height="112" rx="20" class="bad"/>
  <rect x="70" y="342" width="225" height="34" rx="17" fill="#b23b33"/>
  <text x="182" y="365" text-anchor="middle" class="label white">NETWORK PARTITION</text>
  <text x="322" y="360" class="h3 ink">A and B are alive and reachable by clients—but cannot reach each other.</text>
  <text x="70" y="405" class="body muted">The system cannot know whether the other side is slow, disconnected, or dead. Waiting forever is not “available.”</text>
  <path d="M500 388 H555 M645 388 H700" class="broken"/>
  <text x="600" y="397" text-anchor="middle" class="h2 red">✕</text>

  <!-- Choice cards -->
  <rect x="45" y="458" width="535" height="300" rx="22" class="soft"/>
  <text x="312" y="490" text-anchor="middle" class="h2 teal">Choose C + P</text>
  <text x="312" y="518" text-anchor="middle" class="h3 ink">Preserve one correct value</text>
  <text x="312" y="543" text-anchor="middle" class="small muted">One side refuses or waits because it cannot coordinate safely.</text>
  <rect x="78" y="562" width="205" height="86" rx="15" class="good"/>
  <text x="180" y="590" text-anchor="middle" class="h3 ink">Replica A</text><text x="180" y="616" text-anchor="middle" class="body teal">WRITE x = 8 → OK</text>
  <rect x="342" y="562" width="205" height="86" rx="15" class="bad"/>
  <text x="444" y="590" text-anchor="middle" class="h3 ink">Replica B</text><text x="444" y="616" text-anchor="middle" class="body red">WRITE x = 9 → REJECT</text>
  <path d="M288 605 H337" class="broken"/>
  <text x="312" y="681" text-anchor="middle" class="h3 ink">Consistency kept</text>
  <text x="312" y="705" text-anchor="middle" class="body red">Availability lost for the client on B</text>
  <rect x="135" y="724" width="355" height="25" rx="12" fill="#d8efe8"/><text x="312" y="742" text-anchor="middle" class="small teal">Typical when stale/conflicting data is unacceptable</text>

  <rect x="620" y="458" width="535" height="300" rx="22" class="warn"/>
  <text x="887" y="490" text-anchor="middle" class="h2 orange">Choose A + P</text>
  <text x="887" y="518" text-anchor="middle" class="h3 ink">Every reachable side answers</text>
  <text x="887" y="543" text-anchor="middle" class="small muted">Both accept work without knowing what the other side accepted.</text>
  <rect x="653" y="562" width="205" height="86" rx="15" class="good"/>
  <text x="755" y="590" text-anchor="middle" class="h3 ink">Replica A</text><text x="755" y="616" text-anchor="middle" class="body teal">WRITE x = 8 → OK</text>
  <rect x="917" y="562" width="205" height="86" rx="15" class="good"/>
  <text x="1019" y="590" text-anchor="middle" class="h3 ink">Replica B</text><text x="1019" y="616" text-anchor="middle" class="body teal">WRITE x = 9 → OK</text>
  <path d="M863 605 H912" class="broken"/>
  <text x="887" y="681" text-anchor="middle" class="h3 ink">Availability kept</text>
  <text x="887" y="705" text-anchor="middle" class="body orange">Values can diverge; reconcile after healing</text>
  <rect x="710" y="724" width="355" height="25" rx="12" fill="#f7dfb5"/><text x="887" y="742" text-anchor="middle" class="small orange">Typical when temporary conflict/staleness is acceptable</text>

  <!-- Takeaway -->
  <rect x="45" y="785" width="1110" height="82" rx="20" fill="#173632"/>
  <text x="75" y="818" class="label" fill="#8dd8cc">THE PRECISE RULE</text>
  <text x="75" y="848" class="body white">During a partition, you cannot guarantee both: every request succeeds (A) and every read sees one latest value (C).</text>
  <text x="1125" y="817" text-anchor="end" class="small" fill="#b7d8d2">P = keep operating despite lost messages</text>
</svg>
